name: GemmaTrans
options:
  bundleIdPrefix: com.gemmatrans
  deploymentTarget:
    macOS: "14.0"
packages:
  GemmaTransCore:
    path: ../
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
targets:
  GemmaTrans:
    type: application
    platform: macOS
    sources: [GemmaTrans]
    info:
      path: GemmaTrans/Info.plist
      properties:
        LSUIElement: true            # menu bar app，不出现在 Dock
        CFBundleDisplayName: GemmaTrans
        CFBundleIconFile: AppIcon
        LSApplicationCategoryType: public.app-category.productivity
    dependencies:
      - package: GemmaTransCore
        product: GemmaTransKit
      - package: GemmaTransCore
        product: GemmaTransServer
      - package: KeyboardShortcuts
    settings:
      base:
        ENABLE_APP_SANDBOX: NO
        # 稳定签名身份：ad-hoc 每次重建 cdhash 都变，TCC 辅助功能授权会随重建失效；
        # Apple Development 证书签名后授权按"团队+Bundle ID"绑定，重建不丢权限
        DEVELOPMENT_TEAM: G2XC9VU88M
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          # 公证直分：Developer ID + Hardened Runtime（Debug 日常开发不受影响）
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
          ENABLE_HARDENED_RUNTIME: YES
          # 公证要求：签名带安全时间戳；去掉 build 动作默认注入的 get-task-allow 调试 entitlement
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
  GemmaTrans-MAS:
    type: application
    platform: macOS
    sources: [GemmaTrans]
    info:
      path: GemmaTrans/Info.plist
      properties:
        LSUIElement: false
        CFBundleDisplayName: GemmaTrans
        CFBundleIconFile: AppIcon
        LSApplicationCategoryType: public.app-category.productivity
    entitlements:
      path: GemmaTrans-MAS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.server: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    dependencies:
      - package: GemmaTransCore
        product: GemmaTransKit
      - package: GemmaTransCore
        product: GemmaTransServer
      - package: KeyboardShortcuts
    settings:
      base:
        DEVELOPMENT_TEAM: G2XC9VU88M
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.gemmatrans.GemmaTrans
        PRODUCT_NAME: GemmaTrans
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS_BUILD"
